[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
# Allow `dist plan` to tolerate hand-edited files. We pin every third-party
# action in `.github/workflows/release.yml` to a commit SHA (with a comment
# noting the version) for supply-chain hardening, and added a `concurrency:`
# block — `dist generate` would otherwise rewrite both back to its template.
allow-dirty = ["ci"]
