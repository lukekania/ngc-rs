name: Bug report
description: ngc-rs builds something different from `ng build`, panics, or otherwise misbehaves.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more concrete
        the repro, the faster we can fix it.

        Please confirm you can reproduce on the latest released version
        before filing.
  - type: input
    id: ngc-rs-version
    attributes:
      label: ngc-rs version
      description: Output of `ngc-rs --version` (or the npm package version).
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: angular-version
    attributes:
      label: Angular version
      description: From `package.json` (e.g. `"@angular/core": "^21.2.0"`).
      placeholder: "21.2.0"
    validations:
      required: true
  - type: input
    id: os-arch
    attributes:
      label: OS and architecture
      description: e.g. `macOS 14.5 arm64`, `Ubuntu 22.04 x86_64`, `Windows 11 x64`.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact command you ran (and the angular.json builder line, if relevant).
      placeholder: |
        ng build --configuration production
        # angular.json: "builder": "@ngc-rs/builder:application"
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen? If comparing against `ng build`, please include both outputs.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the full command output (set `RUST_LOG=info` for verbose tracing).
      render: text
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Either a link to a public repo that reproduces the issue, or the smallest set of files needed to trigger it.
    validations:
      required: true
