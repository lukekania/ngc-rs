[package]
name = "ngc-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ngc-rs"
path = "src/main.rs"

[dependencies]
ngc-diagnostics = { path = "../diagnostics" }
ngc-project-resolver = { path = "../project-resolver" }
clap = { version = "4.5", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
colored = "3.0"
